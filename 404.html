<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Tersesat dalam Petualangan | Chillventure</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        :root {
            --primary-color: #3852B4; 
            --dark-bg: #f0f0f0;
            --text-dark: #dedede;
        }

        body {
            font-family: "Urbanist", sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.1)), url('/images/images-2.webp') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-dark);
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 0;
            position: relative;
            display: inline-block;
        }

        .compass-icon {
            font-size: 4rem;
            color: #E67E22; 
            position: absolute;
            top: -20px;
            right: -30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        .error-message {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 10px;
            color: var(--dark-bg);
        }

        .error-description {
            color: #feffff;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn-back-home {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 82, 180, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back-home:hover {
            background-color: #2a3e8c;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(56, 82, 180, 0.4);
        }

        /* Ornamen Ombak */
        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%233852B4" fill-opacity="0.1" d="M0,192L48,197.3C96,203,192,213,288,192C384,171,480,117,576,122.7C672,128,768,192,864,202.7C960,213,1056,171,1152,149.3C1248,128,1344,128,1392,128L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            z-index: -1;
        }

        @media (max-width: 576px) {
            .error-code { font-size: 7rem; }
            .compass-icon { font-size: 2.5rem; top: -10px; right: -20px; }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">
            404
            <i class="bi bi-compass compass-icon"></i>
        </div>
        <h1 class="error-message">Oops! Kamu Terlalu Jauh Berlayar.</h1>
        <p class="error-description">
            Halaman yang kamu cari tidak ditemukan di peta kami. <br>
            Mari kembali ke rute yang benar untuk melanjutkan petualangan.
        </p>
        <a href="index.html" class="btn-back-home">
            <i class="bi bi-house-door"></i> Kembali ke Beranda
        </a>
    </div>

    <div class="wave-bg"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
